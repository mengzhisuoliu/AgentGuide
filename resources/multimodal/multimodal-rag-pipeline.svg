  <path d="M 428 191 L 470 191" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 628 191 L 670 191" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 828 191 L 870 191" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

