    <text x="550.5" y="202" class="box-sub">caption / formula / graph</text>
  </g>
  <g>
    <rect x="678" y="154" width="145" height="74" rx="6" fill="#0f172a"/>
    <rect x="678" y="154" width="145" height="74" rx="6" fill="rgba(76,29,149,0.42)" stroke="#a78bfa" stroke-width="1.5"/>
