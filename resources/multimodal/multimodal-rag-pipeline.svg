    <text x="164" y="418" class="box-title">Text Index</text>
    <text x="164" y="437" class="box-sub">paragraph / caption</text>
  </g>
  <g>
    <rect x="290" y="392" width="136" height="66" rx="6" fill="#0f172a"/>
    <rect x="290" y="392" width="136" height="66" rx="6" fill="rgba(6,78,59,0.42)" stroke="#34d399" stroke-width="1.5"/>
    <text x="358" y="418" class="box-title">Table Index</text>
    <text x="358" y="437" class="box-sub">rows / columns / units</text>
  </g>
  <g>
    <rect x="484" y="392" width="136" height="66" rx="6" fill="#0f172a"/>
    <rect x="484" y="392" width="136" height="66" rx="6" fill="rgba(120,53,15,0.32)" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="552" y="418" class="box-title">Image Index</text>
    <text x="552" y="437" class="box-sub">page / figure embedding</text>
  </g>
  <g>
    <rect x="678" y="392" width="136" height="66" rx="6" fill="#0f172a"/>
    <rect x="678" y="392" width="136" height="66" rx="6" fill="rgba(76,29,149,0.42)" stroke="#a78bfa" stroke-width="1.5"/>
