    <rect x="662" y="612" width="160" height="56" rx="6" fill="rgba(120,53,15,0.32)" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="742" y="635" class="box-title">Eval Report</text>
    <text x="742" y="653" class="box-sub">accuracy / grounding / cost</text>
  </g>

  <path d="M 957 462 C 930 540, 810 590, 826 638" fill="none" stroke="#fbbf24" stroke-width="1.6" marker-end="url(#arrow-amber)"/>
  <path d="M 750 232 C 710 300, 670 345, 620 392" fill="none" stroke="#22d3ee" stroke-width="1.4" marker-end="url(#arrow-cyan)"/>
  <path d="M 366 640 L 424 640" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 596 640 L 654 640" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
