<svg viewBox="0 0 1180 760" xmlns="http://www.w3.org/2000/svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
    .title { fill: #f8fafc; font-size: 20px; font-weight: 700; }
    .subtitle { fill: #94a3b8; font-size: 11px; }
    .box-title { fill: #ffffff; font-size: 12px; font-weight: 700; text-anchor: middle; }
    .box-sub { fill: #cbd5e1; font-size: 9px; text-anchor: middle; }
    .tiny { fill: #94a3b8; font-size: 8.5px; text-anchor: middle; }
    .region { font-size: 10px; font-weight: 700; }
  </style>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
  </defs>
  <rect width="1180" height="760" fill="#0f172a"/>
  <rect width="1180" height="760" fill="url(#grid)"/>

  <text x="40" y="46" class="title">Multimodal RAG Pipeline</text>
  <text x="40" y="66" class="subtitle">解析、对齐、索引、检索、生成、引用和评测缺一不可</text>

  <rect x="38" y="94" width="1104" height="190" rx="12" fill="none" stroke="#22d3ee" stroke-dasharray="8,4"/>
  <text x="56" y="116" fill="#22d3ee" class="region">Document Processing</text>

  <g>
    <rect x="78" y="154" width="145" height="74" rx="6" fill="#0f172a"/>
    <rect x="78" y="154" width="145" height="74" rx="6" fill="rgba(8,51,68,0.42)" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="150.5" y="183" class="box-title">Ingestion</text>
    <text x="150.5" y="202" class="box-sub">PDF / Office / Image</text>
  </g>
  <g>
    <rect x="278" y="154" width="145" height="74" rx="6" fill="#0f172a"/>
    <rect x="278" y="154" width="145" height="74" rx="6" fill="rgba(6,78,59,0.42)" stroke="#34d399" stroke-width="1.5"/>
    <text x="350.5" y="183" class="box-title">Parsing</text>
    <text x="350.5" y="202" class="box-sub">layout / table / OCR</text>
  </g>
  <g>
    <rect x="478" y="154" width="145" height="74" rx="6" fill="#0f172a"/>
    <rect x="478" y="154" width="145" height="74" rx="6" fill="rgba(120,53,15,0.32)" stroke="#fbbf24" stroke-width="1.5"/>
