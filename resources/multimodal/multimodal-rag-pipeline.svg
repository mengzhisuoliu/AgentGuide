    <text x="746" y="437" class="box-sub">section -> figure -> claim</text>
  </g>
  <g>
    <rect x="872" y="392" width="170" height="66" rx="6" fill="#0f172a"/>
    <rect x="872" y="392" width="170" height="66" rx="6" fill="rgba(59,130,246,0.32)" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="957" y="418" class="box-title">Evidence Pack</text>
    <text x="957" y="437" class="box-sub">source / page / bbox / quote</text>
  </g>

  <path d="M 236 425 L 282 425" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 430 425 L 476 425" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 624 425 L 670 425" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 818 425 L 864 425" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="142" y="558" width="896" height="126" rx="12" fill="none" stroke="#34d399" stroke-dasharray="8,4"/>
  <text x="160" y="580" fill="#34d399" class="region">Answering & Evaluation</text>

  <g>
    <rect x="202" y="612" width="160" height="56" rx="6" fill="#0f172a"/>
    <rect x="202" y="612" width="160" height="56" rx="6" fill="rgba(6,78,59,0.42)" stroke="#34d399" stroke-width="1.5"/>
    <text x="282" y="635" class="box-title">Answer</text>
    <text x="282" y="653" class="box-sub">claim + citation</text>
  </g>
  <g>
    <rect x="432" y="612" width="160" height="56" rx="6" fill="#0f172a"/>
    <rect x="432" y="612" width="160" height="56" rx="6" fill="rgba(136,19,55,0.42)" stroke="#fb7185" stroke-width="1.5"/>
